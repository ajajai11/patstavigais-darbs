    <h1>Šokolādes kūka</h1>

    <h2>Sastāvdaļas:</h2>
    <ul>
      
<li>BISKVĪTAM</li>

<li>150 g sviesta</li>
<li>150 g cukura</li>
<li>60 g kakao</li>
<li>12 g cepamā pulvera</li>
<li>150 g miltu</li>
<li>šķipsna sāls</li>
<li>3 olas</li>.
<li>2–3 ēdamkarotes piena</li>
 
    </ul>

    <h2>Pagatavošana:</h2>
    <p>Sajauc sastāvdaļas un cep 180°C apmēram 30 minūtes.</p>
