<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Kūku receptes</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Augšējā izvēlne */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: white;
            position: fixed;
            width: 100%;
            top: 0;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        /* Galvenā bilde */
        .hero {
            height: 100vh;
            background-image: url("sokolades.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 20px;
        }

        .button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: orange;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        /* Receptes sadaļa */
        .receptes {
            padding: 50px;
            text-align: center;
        }

        .kukas {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .kukas div {
            width: 200px;
        }

        .kukas img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- Izvēlne -->
    <nav>
        <h2>🍰 Kūkas</h2>
        <div>
            <a href="sokolades_kuka.html" target="_blank">Šokolādes</a>
            <a href="siera_kuka.html" target="_blank">Siera</a>
            <a href="abolu_kuka.html" target="_blank">Ābolu</a>
        </div>
    </nav>

    <!-- Lielā bilde -->
    <div class="hero">
        <div>
            <h1>Sweet store</h1>
            <p>Padari kūku par mākslu</p>
            <a href="#receptes" class="button">Skatīt receptes</a>
        </div>
    </div>

    <!-- Receptes -->
    <div id="receptes" class="receptes">
        <h2>Receptes</h2>

        <div class="kukas">
            <div>
                <a href="sokolades_kuka.html" target="_blank">
                    <img src="sokolades.jpg">
                    <p>Šokolādes kūka</p>
                </a>
            </div>

            <div>
                <a href="siera_kuka.html" target="_blank">
                    <img src="siera.jpg">
                    <p>Siera kūka</p>
                </a>
            </div>

            <div>
                <a href="abolu_kuka.html" target="_blank">
                    <img src="abolu.jpg">
                    <p>Ābolu kūka</p>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
